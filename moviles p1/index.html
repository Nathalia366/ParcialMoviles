<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Directorio de Personas</title>
  <link rel="icon" href="spring.png" type="image/x-icon" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="phone-frame">
    <div class="status-bar">
      <span class="time" id="clock">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor" opacity="0.4"/>
          <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor" opacity="0.6"/>
          <rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="currentColor"/>
          <rect x="14" y="3" width="2" height="6" rx="0.5" fill="currentColor" opacity="0.3"/>
        </svg>
        <svg width="15" height="12" viewBox="0 0 15 12" fill="none">
          <path d="M7.5 2.5C9.8 2.5 11.9 3.4 13.4 4.9L14.8 3.5C12.9 1.6 10.3 0.5 7.5 0.5C4.7 0.5 2.1 1.6 0.2 3.5L1.6 4.9C3.1 3.4 5.2 2.5 7.5 2.5Z" fill="currentColor"/>
          <path d="M7.5 5.5C9 5.5 10.4 6.1 11.4 7.1L12.8 5.7C11.4 4.3 9.5 3.5 7.5 3.5C5.5 3.5 3.6 4.3 2.2 5.7L3.6 7.1C4.6 6.1 6 5.5 7.5 5.5Z" fill="currentColor"/>
          <circle cx="7.5" cy="10" r="1.5" fill="currentColor"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/>
          <rect x="2" y="2" width="16" height="8" rx="2" fill="currentColor"/>
          <path d="M23 4.5V7.5C23.8 7.2 24.5 6.5 24.5 6C24.5 5.5 23.8 4.8 23 4.5Z" fill="currentColor" opacity="0.4"/>
        </svg>
      </div>
    </div>

    <div class="app-header">
      <div class="header-top">
        <div class="app-logo">
          <div class="logo-dot"></div>
          <span>Contactos</span>
        </div>
        <button class="refresh-btn" id="refreshBtn" title="Recargar datos">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <p class="header-subtitle">Directorio de contactos</p>
    </div>

    <!-- Buscador -->
    <div class="search-section">
      <p class="section-label">Buscar por ID</p>
      <div class="search-box">
        <input
          type="number"
          id="searchInput"
          placeholder="Ej: 1, 2, 3…"
          min="1"
        />
        <button id="searchBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>

      <!-- Resultado de búsqueda -->
      <div id="searchResult" class="search-result hidden"></div>
    </div>

    <!-- Lista de personas -->
    <div class="list-section">
      <div class="list-header">
        <p class="section-label">Todos los contactos</p>
        <span class="count-badge" id="countBadge">—</span>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Cargando datos…</p>
      </div>

      <div id="errorState" class="error-state hidden">
        <div class="error-icon">!</div>
        <p id="errorMsg">No se pudo conectar al servidor.</p>
        <button class="retry-btn" id="retryBtn">Reintentar</button>
      </div>

      <div id="cardList" class="card-list"></div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L3 9v11h6v-6h6v6h6V9z"/>
        </svg>
        <span>Inicio</span>
      </div>
      <div class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Buscar</span>
      </div>
      <div class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Perfil</span>
      </div>
    </div>
  </div>
  <div class="floating-credits">
  <p class="credits-names">Ilder Gutiérrez &amp; Nathalia Andrade</p>
  <p class="credits-subject">Parcial de Móviles 1</p>
</div>

  <script src="app.js"></script>
</body>
</html>
